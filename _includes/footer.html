<footer class="footer">
  <div class="footer__inner">
    <p class="footer__copy">&copy; {{ site.time | date: '%Y' }} {{ site.footer.copyright }} &mdash; Porto, Portugal</p>
    <div class="footer__social" aria-label="Social links">
      {% for network in site.social %}
      <a class="footer__social-link" href="{{ network.url }}" target="_blank" rel="noopener noreferrer" aria-label="{{ network.title | capitalize }}">
        <i class="fa-brands fa-{{ network.title }}" aria-hidden="true"></i>
      </a>
      {% endfor %}
    </div>
  </div>
</footer>

<a class="scroll-top" href="#page-top" aria-label="Back to top">
  <i class="fa-solid fa-chevron-up" aria-hidden="true"></i>
</a>
