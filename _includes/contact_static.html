<section class="contact" id="contact">
  <div class="section-inner section-inner--narrow">
    <h2 class="section-title section-title--light">Get in touch</h2>
    <p class="contact__lead">I'm open to backend engineering roles and interesting projects. The best way to reach me is directly by email.</p>
    <a class="contact__email" href="mailto:{{ site.email }}">
      <i class="fa-solid fa-envelope" aria-hidden="true"></i>
      {{ site.email }}
    </a>
    <div class="contact__social">
      {% for network in site.social %}
      <a class="contact__social-link" href="{{ network.url }}" target="_blank" rel="noopener noreferrer" aria-label="{{ network.title | capitalize }}">
        <i class="fa-brands fa-{{ network.title }}" aria-hidden="true"></i>
        <span>{{ network.title | capitalize }}</span>
      </a>
      {% endfor %}
    </div>
  </div>
</section>
