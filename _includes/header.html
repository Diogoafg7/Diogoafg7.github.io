<!-- Header -->
<header>
  <style>
    .rounded-img {
      width: 300px;
      height: 300px;
      border-radius: 50%;
      object-fit: cover;
    }
    .header-tagline {
      display: block;
      font-size: 1em;
      font-weight: 300;
      margin-top: 12px;
      opacity: 0.85;
      letter-spacing: 0.5px;
    }
    @media (min-width: 768px) {
      .header-tagline {
        font-size: 1.15em;
      }
    }
    .header-cta {
      margin-top: 28px;
      display: flex;
      justify-content: center;
      gap: 16px;
      flex-wrap: wrap;
    }
    .header-cta .btn-outline-light {
      border: 2px solid #fff;
      color: #fff;
      background: transparent;
      padding: 10px 24px;
      font-family: Montserrat, "Helvetica Neue", Helvetica, Arial, sans-serif;
      font-weight: 700;
      font-size: 0.85em;
      text-transform: uppercase;
      letter-spacing: 1px;
      border-radius: 2px;
      transition: all .25s ease;
      text-decoration: none;
    }
    .header-cta .btn-outline-light:hover {
      background: #fff;
      color: #18bc9c;
    }
    .header-cta .btn-solid-light {
      border: 2px solid #fff;
      color: #18bc9c;
      background: #fff;
      padding: 10px 24px;
      font-family: Montserrat, "Helvetica Neue", Helvetica, Arial, sans-serif;
      font-weight: 700;
      font-size: 0.85em;
      text-transform: uppercase;
      letter-spacing: 1px;
      border-radius: 2px;
      transition: all .25s ease;
      text-decoration: none;
    }
    .header-cta .btn-solid-light:hover {
      background: transparent;
      color: #fff;
    }
  </style>

  <div class="container">
    <div class="row">
      <div class="col-lg-12">
        <img class="img-responsive rounded-img" src="img/profile.png" alt="Diogo Gomes" />
        <div class="intro-text">
          <span class="name">{{ site.title }}</span>
          <hr class="star-light" />
          <span class="skills">{{ site.skills }}</span>
          <span class="header-tagline">Computer Science graduate · 1+ year at Natixis · Porto, Portugal</span>
          <div class="header-cta">
            <a href="#experience" class="btn-outline-light page-scroll">Experience</a>
            <a href="#portfolio" class="btn-outline-light page-scroll">Projects</a>
            <a href="#contact" class="btn-solid-light page-scroll">Get in touch</a>
          </div>
        </div>
      </div>
    </div>
  </div>
</header>
