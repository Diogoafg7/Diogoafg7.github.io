<header class="hero" id="hero">
  <div class="hero__bg-pattern" aria-hidden="true"></div>
  <div class="hero__inner">
    <div class="hero__content">
      <p class="hero__eyebrow">Hello, I'm</p>
      <h1 class="hero__name">{{ site.title }}</h1>
      <p class="hero__role"><span id="hero-typewriter">{{ site.skills }}</span><span class="hero__cursor" aria-hidden="true">|</span></p>
      <p class="hero__tagline">1+ year at Natixis &middot; C#/.NET &middot; Porto, Portugal</p>
      <div class="hero__ctas">
        <a href="#experience" class="btn btn--outline">Experience</a>
        <a href="#portfolio" class="btn btn--outline">Projects</a>
        <a href="#contact" class="btn btn--accent">Get in touch</a>
      </div>
    </div>
    <div class="hero__photo-wrap">
      <img class="hero__photo" src="{{ '/img/profile.png' | relative_url }}" alt="Diogo Gomes" width="260" height="260">
    </div>
  </div>
</header>
